name: Bug report
description: Report a reproducible problem in RadioCLI.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command, key sequence, and station if one is involved.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Include RadioCLI version, Node version, OS, and playback backend.
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste `radiocli check` output when relevant.
